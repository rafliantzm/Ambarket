<!DOCTYPE html><html><head>

    This is a placeholder for base href that will be replaced by the value of

  <meta charset="UTF-8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="icon" type="image/png" href="favicon.png">

  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">

  <style id="ambarket-boot-style">
    :root {
      --bg-charcoal: #061512;
      --glow-red: rgba(16, 185, 129, 0.18);
      --text-white: #f5f5f7;
      --text-muted: #a7d8c8;
      --accent-red: #10b981;
      --accent-glow: #bff8e3;
      --track-bg: rgba(255, 255, 255, 0.12);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background-color: var(--bg-charcoal);
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Core Boot Loader Container */
    #ambarket-boot-loader {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(16, 185, 129, 0.16), transparent 42%),
        linear-gradient(160deg, #061512 0%, #08251f 48%, #03110e 100%);
      z-index: 9999;
      transition: opacity 0.35s ease, transform 0.35s ease;
      will-change: opacity, transform;
    }

    #ambarket-boot-loader.boot-loader--exit {
      opacity: 0;
      transform: scale(1.01);
      pointer-events: none;
    }

    /* Radial Glow */
    .boot-background {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, var(--glow-red) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Network Grid (SVG Data URI) */
    .boot-grid {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h60v60H0V0zm30 30h30v30H30V30zM0 30h30v30H0V30zM30 0h30v30H30V0zM0 0h30v30H0V0z' fill='none' stroke='rgba(255,255,255,0.015)' stroke-width='1'/%3E%3C/svg%3E");
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Slow drifting nodes */
    .boot-nodes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .boot-node {
      position: absolute;
      width: 5px;
      height: 5px;
      background-color: var(--accent-glow);
      border-radius: 50%;
      box-shadow: 0 0 12px 2px rgba(16, 185, 129, 0.65);
      opacity: 0.6;
      animation: drift 10s infinite linear alternate;
      will-change: transform;
    }

    .boot-node:nth-child(1) { top: 20%; left: 30%; animation-delay: 0s; }
    .boot-node:nth-child(2) { top: 70%; left: 20%; animation-delay: -2s; animation-duration: 12s; }
    .boot-node:nth-child(3) { top: 40%; right: 25%; animation-delay: -5s; animation-duration: 8s; }
    .boot-node:nth-child(4) { top: 80%; right: 40%; animation-delay: -7s; animation-duration: 15s; }

    @keyframes drift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(30px, -20px); }
    }

    /* Brand Content */
    .boot-brand {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 400px;
      padding: 0 24px;
      text-align: center;
    }

    .boot-logo-container {
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUpIn 0.8s ease forwards;
    }

    /* SVG inline logo */
    .boot-logo {
      width: 96px;
      height: 96px;
      filter: drop-shadow(0 0 12px var(--glow-red));
    }

    .boot-wordmark {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-white);
      letter-spacing: -0.5px;
      margin: 0 0 8px 0;
      opacity: 0;
      animation: fadeUpIn 0.8s ease 0.1s forwards;
    }

    .boot-tagline {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0 0 40px 0;
      opacity: 0;
      animation: fadeUpIn 0.8s ease 0.2s forwards;
    }

    /* Progress Indicator */
    .boot-progress-container {
      width: 220px;
      height: 2px;
      background-color: var(--track-bg);
      border-radius: 1px;
      overflow: hidden;
      position: relative;
      opacity: 0;
      animation: fadeUpIn 0.8s ease 0.3s forwards;
    }

    .boot-progress-bar {
      position: absolute;
      top: 0;
      left: -50%;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, var(--accent-red), var(--accent-glow), transparent);
      border-radius: 1px;
      animation: indeterminate 1.8s infinite cubic-bezier(0.65, 0, 0.35, 1);
      will-change: left;
    }

    @keyframes indeterminate {
      0% { left: -50%; }
      100% { left: 100%; }
    }

    .boot-status {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0;
      animation: fadeUpIn 0.8s ease 0.4s forwards;
    }

    @keyframes fadeUpIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Fallback Error State */
    .boot-error {
      display: none;
      margin-top: 24px;
      padding: 12px 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-white);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .boot-error:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      .boot-node,
      .boot-progress-bar {
        animation: none;
      }
      .boot-progress-bar {
        left: 0;
        width: 100%;
        opacity: 0.5;
        animation: pulse 2s infinite alternate ease-in-out;
      }
      @keyframes pulse {
        0% { opacity: 0.3; }
        100% { opacity: 0.8; }
      }
      .boot-logo-container,
      .boot-wordmark,
      .boot-tagline,
      .boot-progress-container,
      .boot-status {
        animation: none;
        opacity: 1;
        transform: none;
      }
      #ambarket-boot-loader.boot-loader--exit {
        transform: none;
      }
    }
  </style>
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #F6FFFB;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #061512;
          }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>

  <div id="ambarket-boot-loader" aria-hidden="false">
    <div class="boot-background" aria-hidden="true"></div>
    <div class="boot-grid" aria-hidden="true"></div>
    <div class="boot-nodes" aria-hidden="true">
      <div class="boot-node"></div>
      <div class="boot-node"></div>
      <div class="boot-node"></div>
      <div class="boot-node"></div>
    </div>

    <div class="boot-brand">
      <div class="boot-logo-container">
        <!-- Ambarket Inline SVG Logo (Preloved Marketplace) -->
        <svg class="boot-logo" fill="none" aria-label="Ambarket Logo" role="img" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="6" width="88" height="88" rx="22" fill="url(#ambarketGradient)"></rect>
          <path d="M30 39H70C75.5228 39 80 43.4772 80 49V74C80 79.5228 75.5228 84 70 84H30C24.4772 84 20 79.5228 20 74V49C20 43.4772 24.4772 39 30 39Z" stroke="white" stroke-width="5.5" stroke-linejoin="round"></path>
          <path d="M37 39V31C37 23.8203 42.8203 18 50 18C57.1797 18 63 23.8203 63 31V39" stroke="white" stroke-width="5.5" stroke-linecap="round"></path>
          <path d="M31 61C36 53 47 53 52 61C57 69 68 69 73 61" stroke="#BFF8E3" stroke-width="5.5" stroke-linecap="round"></path>
          <path d="M31 67C36 75 47 75 52 67C57 59 68 59 73 67" stroke="#BFF8E3" stroke-width="5.5" stroke-linecap="round"></path>
          <path d="M70 54L82 66L70 78L58 66L70 54Z" fill="#BFF8E3"></path>
          <circle cx="70" cy="66" r="2.5" fill="#063E35"></circle>
          <defs>
            <linearGradient id="ambarketGradient" x1="8" y1="10" x2="94" y2="94" gradientUnits="userSpaceOnUse">
              <stop stop-color="#06544E"></stop>
              <stop offset="1" stop-color="#10B981"></stop>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="boot-wordmark">Ambarket</h1>
      <p class="boot-tagline">Preloved berkualitas, belanja lebih percaya</p>

      <div class="boot-progress-container" role="progressbar" aria-label="Loading">
        <div class="boot-progress-bar"></div>
      </div>

      <div class="boot-status" aria-live="polite">Menyiapkan pengalaman belanja...</div>

      <button class="boot-error" id="boot-error-btn" onclick="window.ambarketReload()">
        Muat Ulang
      </button>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async=""></script>

  <script>
    window.ambarketReload = function() {
      const url = new URL(window.location.href);
      url.searchParams.set('_ambarketReload', Date.now().toString());
      window.location.replace(url.toString());
    };

    // Fallback: If Flutter doesn't load within 60s, show error state
    setTimeout(() => {
      const loader = document.getElementById('ambarket-boot-loader');
      if (loader && !loader.classList.contains('boot-loader--exit')) {
        const errorBtn = document.getElementById('boot-error-btn');
        const statusText = document.querySelector('.boot-status');
        if (errorBtn && statusText) {
          errorBtn.style.display = 'block';
          statusText.textContent = 'Ambarket belum dapat dimuat.';
        }
      }
    }, 60000);
  </script>


</body></html>
