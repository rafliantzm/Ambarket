name: Ambarket Android Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          pwd
          ls -la
          ls -la ambarket_mobile
          test -f ambarket_mobile/pubspec.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        working-directory: ambarket_mobile
        run: flutter --version

      - name: Create env file
        working-directory: ambarket_mobile
        run: |
          cat > .env <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          EOF

      - name: Install dependencies
        working-directory: ambarket_mobile
        run: flutter pub get

      - name: Analyze
        working-directory: ambarket_mobile
        run: flutter analyze

      - name: Test
        working-directory: ambarket_mobile
        run: flutter test

      - name: Build APK release
        working-directory: ambarket_mobile
        run: flutter build apk --release

      - name: Build AppBundle release
        working-directory: ambarket_mobile
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ambarket-rc1-apk
          path: ambarket_mobile/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ambarket-rc1-aab
          path: ambarket_mobile/build/app/outputs/bundle/release/app-release.aab
